<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MASA</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --black: #0a0a0a;
      --black-light: #141414;
      --black-lighter: #1a1a1a;
      --cream: #f5f0e8;
      --cream-dark: #e6dfd3;
      --gold: #c9a959;
      --gold-light: #d4ba6a;
      --gold-dark: #a68a3a;
      --burgundy: #722f37;
      --burgundy-light: #8b3a44;
      --ink: #2c2c2c;
      
      --font-display: 'Playfair Display', Georgia, serif;
      --font-elegant: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
      
      --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      background: var(--black);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1000;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Screens */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; animation: fadeIn 0.5s var(--ease-smooth); }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===================== */
    /* HOME / ENTRANCE SCREEN */
    /* ===================== */
    .entrance {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
    }

    .emblem {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      position: relative;
    }
    
    .emblem-ring {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 1px solid var(--gold);
      border-radius: 50%;
      animation: rotate 20s linear infinite;
    }
    
    .emblem-ring::before,
    .emblem-ring::after {
      content: '✦';
      position: absolute;
      color: var(--gold);
      font-size: 10px;
    }
    .emblem-ring::before { top: -5px; left: 50%; transform: translateX(-50%); }
    .emblem-ring::after { bottom: -5px; left: 50%; transform: translateX(-50%); }
    
    @keyframes rotate {
      to { transform: rotate(360deg); }
    }
    
    .emblem-inner {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 1px solid var(--gold-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .emblem-symbol {
      font-size: 36px;
      color: var(--gold);
      font-family: var(--font-display);
      font-weight: 400;
      letter-spacing: 2px;
    }

    .brand {
      margin-bottom: 48px;
    }
    
    .brand-name {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 12px;
      color: var(--cream);
      margin-bottom: 12px;
    }
    
    .brand-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 12px;
    }
    
    .brand-tagline {
      font-family: var(--font-elegant);
      font-size: 14px;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .entry-cards {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
    }
    
    .entry-card {
      width: 56px;
      height: 78px;
      background: var(--black-lighter);
      border: 1px solid var(--gold-dark);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.4s var(--ease-smooth);
      position: relative;
      overflow: hidden;
    }
    
    .entry-card::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border: 1px solid var(--gold-dark);
      border-radius: 2px;
      opacity: 0.3;
    }
    
    .entry-card:hover {
      transform: translateY(-4px) rotate(-2deg);
      border-color: var(--gold);
      box-shadow: 0 10px 30px rgba(201, 169, 89, 0.1);
    }

    .actions {
      width: 100%;
      max-width: 280px;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.3s var(--ease-smooth);
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary {
      background: var(--gold);
      color: var(--black);
      margin-bottom: 12px;
    }
    
    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(201, 169, 89, 0.3);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--cream);
      border: 1px solid var(--cream-dark);
    }
    
    .btn-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .footer-note {
      position: absolute;
      bottom: 32px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(245, 240, 232, 0.3);
      letter-spacing: 1px;
    }

    /* ===================== */
    /* CREATE / JOIN SCREENS */
    /* ===================== */
    .page-header {
      margin-bottom: 40px;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(245, 240, 232, 0.5);
      text-decoration: none;
      letter-spacing: 1px;
      margin-bottom: 32px;
      cursor: pointer;
      transition: color 0.3s;
    }
    
    .back-link:hover { color: var(--gold); }
    
    .page-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    
    .page-subtitle {
      font-family: var(--font-elegant);
      font-size: 15px;
      font-style: italic;
      color: rgba(245, 240, 232, 0.5);
    }

    .form-section {
      margin-bottom: 32px;
    }
    
    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }
    
    .form-input {
      width: 100%;
      padding: 16px 0;
      font-family: var(--font-elegant);
      font-size: 20px;
      color: var(--cream);
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(245, 240, 232, 0.2);
      outline: none;
      transition: border-color 0.3s;
    }
    
    .form-input::placeholder {
      color: rgba(245, 240, 232, 0.3);
      font-style: italic;
    }
    
    .form-input:focus {
      border-color: var(--gold);
    }

    /* Code Input */
    .code-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .code-input {
      width: 44px;
      height: 56px;
      background: var(--black-lighter);
      border: 1px solid rgba(245, 240, 232, 0.15);
      border-radius: 2px;
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--cream);
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: all 0.3s;
    }
    
    .code-input:focus {
      border-color: var(--gold);
      background: rgba(201, 169, 89, 0.05);
    }
    
    .code-input.filled {
      border-color: var(--gold-dark);
    }

    /* Settings */
    .setting-group {
      margin-bottom: 28px;
    }
    
    .setting-options {
      display: flex;
      gap: 8px;
    }
    
    .setting-btn {
      flex: 1;
      padding: 14px 8px;
      background: var(--black-lighter);
      border: 1px solid rgba(245, 240, 232, 0.1);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    
    .setting-btn:hover {
      border-color: rgba(245, 240, 232, 0.3);
    }
    
    .setting-btn.active {
      border-color: var(--gold);
      background: rgba(201, 169, 89, 0.08);
    }
    
    .setting-icon {
      font-size: 20px;
      margin-bottom: 6px;
    }
    
    .setting-label {
      font-size: 11px;
      color: rgba(245, 240, 232, 0.7);
      letter-spacing: 1px;
    }
    
    .setting-btn.active .setting-label {
      color: var(--gold);
    }

    .category-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .category-btn {
      padding: 10px 16px;
      background: var(--black-lighter);
      border: 1px solid rgba(245, 240, 232, 0.1);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 12px;
      color: rgba(245, 240, 232, 0.7);
      letter-spacing: 1px;
    }
    
    .category-btn:hover {
      border-color: rgba(245, 240, 232, 0.3);
    }
    
    .category-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 169, 89, 0.08);
    }

    .form-actions {
      margin-top: auto;
      padding-top: 24px;
    }

    /* ===================== */
    /* LOBBY SCREEN */
    /* ===================== */
    .room-code-section {
      text-align: center;
      padding: 32px 24px;
      background: var(--black-lighter);
      border: 1px solid rgba(245, 240, 232, 0.08);
      margin-bottom: 32px;
      position: relative;
    }
    
    .room-code-section::before,
    .room-code-section::after {
      content: '◆';
      position: absolute;
      top: -8px;
      font-size: 12px;
      color: var(--gold-dark);
    }
    .room-code-section::before { left: 24px; }
    .room-code-section::after { right: 24px; }
    
    .room-code-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(245, 240, 232, 0.4);
      margin-bottom: 12px;
    }
    
    .room-code-value {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 8px;
      color: var(--gold);
      margin-bottom: 16px;
    }
    
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(245, 240, 232, 0.2);
      color: var(--cream);
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .share-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .members-section {
      flex: 1;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(245, 240, 232, 0.5);
      text-transform: uppercase;
    }
    
    .member-count {
      font-size: 11px;
      color: var(--gold);
    }
    
    .member-card {
      display: flex;
      align-items: center;
      padding: 16px;
      background: var(--black-lighter);
      border-left: 2px solid transparent;
      margin-bottom: 8px;
      transition: all 0.3s;
    }
    
    .member-card.host {
      border-left-color: var(--gold);
      background: rgba(201, 169, 89, 0.05);
    }
    
    .member-avatar {
      width: 40px;
      height: 40px;
      background: var(--black);
      border: 1px solid rgba(245, 240, 232, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 14px;
    }
    
    .member-info { flex: 1; }
    
    .member-name {
      font-family: var(--font-elegant);
      font-size: 17px;
      margin-bottom: 2px;
    }
    
    .member-status {
      font-size: 11px;
      color: rgba(245, 240, 232, 0.4);
    }
    
    .member-status.ready {
      color: var(--gold);
    }
    
    .host-mark {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 1px;
      padding: 4px 10px;
      border: 1px solid var(--gold-dark);
    }

    /* ===================== */
    /* GAME SCREEN */
    /* ===================== */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .exit-btn {
      font-size: 11px;
      color: rgba(245, 240, 232, 0.4);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }
    
    .round-indicator {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .scores-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    .score-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--black-lighter);
      border: 1px solid transparent;
      border-radius: 2px;
      transition: all 0.3s;
    }
    
    .score-chip.active {
      border-color: var(--gold);
      background: rgba(201, 169, 89, 0.08);
    }
    
    .score-avatar { font-size: 18px; }
    .score-points {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--gold);
    }

    .turn-indicator {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .turn-avatar {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .turn-text {
      font-family: var(--font-elegant);
      font-size: 18px;
      font-style: italic;
    }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Draw Button */
    .draw-button {
      width: 160px;
      height: 200px;
      background: var(--black-lighter);
      border: 1px solid var(--gold);
      cursor: pointer;
      position: relative;
      transition: all 0.4s var(--ease-smooth);
    }
    
    .draw-button::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 1px solid var(--gold-dark);
    }
    
    .draw-button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(201, 169, 89, 0.15);
    }
    
    .draw-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .draw-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    
    .draw-symbol {
      font-size: 48px;
      color: var(--gold);
    }
    
    .draw-text {
      font-family: var(--font-elegant);
      font-size: 14px;
      color: var(--cream);
      letter-spacing: 2px;
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 320px;
      background: var(--cream);
      color: var(--black);
      padding: 32px 24px;
      position: relative;
      animation: cardReveal 0.5s var(--ease-bounce);
    }
    
    @keyframes cardReveal {
      0% { transform: scale(0.8) rotateY(90deg); opacity: 0; }
      100% { transform: scale(1) rotateY(0); opacity: 1; }
    }
    
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1px solid var(--gold-dark);
    }
    .card::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .card::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }
    
    .card-category {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .card-category-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .card-category-name {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--burgundy);
      text-transform: uppercase;
    }
    
    .card-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 24px;
    }
    
    .card-text {
      font-family: var(--font-elegant);
      font-size: 22px;
      line-height: 1.5;
      text-align: center;
      color: var(--ink);
      margin-bottom: 24px;
    }
    
    .card-timer {
      text-align: center;
    }
    
    .timer-bar {
      height: 3px;
      background: rgba(0, 0, 0, 0.1);
      margin-bottom: 8px;
      overflow: hidden;
    }
    
    .timer-fill {
      height: 100%;
      background: var(--burgundy);
      transition: width 1s linear;
    }
    
    .timer-fill.warning { background: #c0392b; }
    
    .timer-text {
      font-size: 12px;
      color: var(--ink);
      opacity: 0.5;
    }

    .card-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      margin-top: 24px;
    }
    
    .card-actions .btn {
      flex: 1;
      padding: 14px;
      font-size: 12px;
    }
    
    .btn-pass {
      background: transparent;
      border: 1px solid rgba(245, 240, 232, 0.3);
      color: var(--cream);
    }
    
    .btn-pass:hover {
      border-color: var(--cream);
    }
    
    .btn-done {
      background: var(--gold);
      color: var(--black);
    }

    /* Voting */
    .voting-section {
      width: 100%;
      max-width: 320px;
    }
    
    .voting-title {
      font-family: var(--font-elegant);
      font-size: 16px;
      text-align: center;
      margin-bottom: 20px;
      font-style: italic;
    }
    
    .voting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 10px;
    }
    
    .vote-card {
      padding: 16px 12px;
      background: var(--black-lighter);
      border: 1px solid rgba(245, 240, 232, 0.1);
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .vote-card:hover {
      border-color: rgba(245, 240, 232, 0.3);
    }
    
    .vote-card.selected {
      border-color: var(--gold);
      background: rgba(201, 169, 89, 0.1);
    }
    
    .vote-avatar { font-size: 28px; margin-bottom: 8px; }
    .vote-name { font-size: 12px; color: var(--cream); }
    .vote-count {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 10px;
      background: var(--burgundy);
      font-size: 11px;
      color: var(--cream);
    }

    /* Reactions */
    .reactions-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px 0;
    }
    
    .reaction-btn {
      width: 44px;
      height: 44px;
      background: var(--black-lighter);
      border: 1px solid rgba(245, 240, 232, 0.1);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .reaction-btn:hover {
      border-color: var(--gold);
      transform: scale(1.1);
    }
    
    .floating-reaction {
      position: fixed;
      font-size: 36px;
      pointer-events: none;
      animation: floatUp 2s var(--ease-smooth) forwards;
    }
    
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-150px) scale(1.3); }
    }

    /* ===================== */
    /* RESULTS SCREEN */
    /* ===================== */
    .results-header {
      text-align: center;
      padding: 40px 0;
    }
    
    .results-ornament {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 6px;
      margin-bottom: 16px;
    }
    
    .results-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    
    .results-winner {
      font-family: var(--font-elegant);
      font-size: 16px;
      font-style: italic;
      color: var(--gold);
    }

    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      margin: 40px 0;
      height: 220px;
    }
    
    .podium-place {
      text-align: center;
      animation: riseUp 0.6s var(--ease-bounce) backwards;
    }
    
    .podium-place:nth-child(1) { animation-delay: 0.2s; }
    .podium-place:nth-child(2) { animation-delay: 0s; }
    .podium-place:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .podium-player {
      margin-bottom: 12px;
    }
    
    .podium-avatar { font-size: 32px; margin-bottom: 6px; }
    .podium-name { font-family: var(--font-elegant); font-size: 15px; }
    .podium-score { font-size: 12px; color: var(--gold); }
    
    .podium-block {
      width: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 24px;
      color: var(--black);
    }
    
    .podium-block.gold {
      background: linear-gradient(180deg, #d4ba6a 0%, #a68a3a 100%);
      height: 100px;
    }
    .podium-block.silver {
      background: linear-gradient(180deg, #c0c0c0 0%, #8a8a8a 100%);
      height: 70px;
    }
    .podium-block.bronze {
      background: linear-gradient(180deg, #cd9a6a 0%, #8b5a3a 100%);
      height: 50px;
    }

    .results-actions {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Confetti */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 100;
    }
    
    .confetti {
      position: absolute;
      font-size: 20px;
      animation: confettiFall 4s linear forwards;
    }
    
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- ENTRANCE SCREEN -->
    <div id="entrance-screen" class="screen entrance active">

      <div class="entry-cards">

      <div class="actions">

        <button class="btn btn-secondary" onclick="showScreen('join-screen')">

      <p class="footer-note">Sadece davetliler için</p>

    <!-- CREATE SCREEN -->
    <div id="create-screen" class="screen">

        <a class="back-link" onclick="showScreen('entrance-screen')">← Geri</a>
        <h1 class="page-title">Masa Kur</h1>
        <p class="page-subtitle">Oyun kurallarını belirle</p>
      </div>
      
      <div class="form-section">
        <label class="form-label">Adın</label>

      </div>
      
      <div class="setting-group">
        <label class="form-label">Atmosfer</label>
        <div class="setting-options">
          <div class="setting-btn" data-intensity="1" onclick="selectIntensity(1)">

          </div>
          <div class="setting-btn active" data-intensity="2" onclick="selectIntensity(2)">

          <div class="setting-btn" data-intensity="3" onclick="selectIntensity(3)">
            <div class="setting-icon">🔥</div>

          </div>

      </div>
      
      <div class="setting-group">
        <label class="form-label">Oyun Türleri</label>
        <div class="category-options">
          <button class="category-btn active" data-cat="itiraf" onclick="toggleCategory('itiraf')">İtiraf</button>
          <button class="category-btn active" data-cat="cesaret" onclick="toggleCategory('cesaret')">Cesaret</button>
          <button class="category-btn active" data-cat="oylama" onclick="toggleCategory('oylama')">Oylama</button>
        </div>
      </div>
      
      <div class="form-actions">
        <button class="btn btn-primary" onclick="createRoom()">Masayı Aç</button>
      </div>
    </div>

    <!-- JOIN SCREEN -->
    <div id="join-screen" class="screen">
      <div class="page-header">
        <a class="back-link" onclick="showScreen('entrance-screen')">← Geri</a>
        <h1 class="page-title">Davetiye</h1>
        <p class="page-subtitle">6 haneli kodu gir</p>
      </div>
      
      <div class="form-section" style="text-align: center;">
        <div class="code-container">
          <input type="text" class="code-input" maxlength="1" oninput="handleCodeInput(this, 0)">
          <input type="text" class="code-input" maxlength="1" oninput="handleCodeInput(this, 1)">
          <input type="text" class="code-input" maxlength="1" oninput="handleCodeInput(this, 2)">
          <input type="text" class="code-input" maxlength="1" oninput="handleCodeInput(this, 3)">
          <input type="text" class="code-input" maxlength="1" oninput="handleCodeInput(this, 4)">
          <input type="text" class="code-input" maxlength="1" oninput="handleCodeInput(this, 5)">
        </div>
      </div>
      
      <div class="form-section">
        <label class="form-label">Adın</label>
        <input type="text" id="player-name" class="form-input" placeholder="Nasıl çağıralım..." maxlength="20">
      </div>
      
      <div class="form-actions">
        <button class="btn btn-primary" onclick="joinRoom()">Masaya Otur</button>
      </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen">
      <a class="back-link" onclick="leaveRoom()">← Ayrıl</a>
      
      <div class="room-code-section">

        <button class="share-btn" onclick="shareRoom()">
          <span>Paylaş</span>

      <div class="members-section">
        <div class="section-header">
          <span class="section-title">Masadakiler</span>

      </div>
      
      <div class="form-actions">
        <button class="btn btn-primary" id="start-btn" onclick="startGame()" style="display: none;">

        <button class="btn btn-secondary" id="ready-btn" onclick="toggleReady()">
          Hazırım
        </button>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <div class="game-header">
        <button class="exit-btn" onclick="showScreen('entrance-screen')">✕ ÇIK</button>
        <span class="round-indicator" id="round-indicator">I / V</span>
      </div>
      
      <div class="scores-bar" id="scoreboard"></div>
      
      <div class="turn-indicator" id="turn-indicator">
        <div class="turn-avatar">🦊</div>
        <div class="turn-text">Senin sıran</div>
      </div>
      
      <div class="game-area" id="game-area">
        <button class="draw-button" id="draw-btn" onclick="drawCard()">
          <div class="draw-content">
            <span class="draw-symbol">✦</span>
            <span class="draw-text">Kart Çek</span>
          </div>
        </button>
      </div>
      
      <div class="reactions-bar" id="reactions-bar" style="display: none;">
        <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
        <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
        <button class="reaction-btn" onclick="sendReaction('😱')">😱</button>
        <button class="reaction-btn" onclick="sendReaction('👏')">👏</button>
        <button class="reaction-btn" onclick="sendReaction('💀')">💀</button>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
      <div class="confetti-container" id="confetti"></div>
      
      <div class="results-header">
        <div class="results-ornament">✦ ✦ ✦</div>
        <h1 class="results-title">Oyun Bitti</h1>
        <p class="results-winner" id="winner-text">Tebrikler</p>
      </div>
      
      <div class="podium" id="podium"></div>
      
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="shareResults()">Sonuçları Paylaş</button>
        <button class="btn btn-primary" onclick="playAgain()">Tekrar Oyna</button>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // KART VERİTABANI
    // ==========================================
    const cards = [
      // İTİRAF - Seviye 1
      { id: 1, category: 'itiraf', intensity: 1, text: 'Bugün söylediğin en küçük yalan neydi?' },
      { id: 2, category: 'itiraf', intensity: 1, text: 'En son ne zaman ve neden ağladın?' },
      { id: 3, category: 'itiraf', intensity: 1, text: 'Telefonundaki en utanç verici uygulama hangisi?' },
      { id: 4, category: 'itiraf', intensity: 1, text: 'En garip korkun nedir?' },
      { id: 5, category: 'itiraf', intensity: 1, text: 'Bugün yaptığın en tembel şey neydi?' },
      { id: 6, category: 'itiraf', intensity: 1, text: 'Hiç tanımadığın birine el salladın mı?' },
      // İTİRAF - Seviye 2
      { id: 7, category: 'itiraf', intensity: 2, text: 'Sosyal medyada stalkladığın kişi kim?' },
      { id: 8, category: 'itiraf', intensity: 2, text: 'Bu masadaki biri hakkında düşündüğün ama söylemediğin bir şey?' },
      { id: 9, category: 'itiraf', intensity: 2, text: 'En utanç verici arama geçmişin ne olurdu?' },
      { id: 10, category: 'itiraf', intensity: 2, text: 'Ailenin bilmediği bir sırrın var mı?' },
      { id: 11, category: 'itiraf', intensity: 2, text: 'En son pişman olduğun mesaj ne?' },
      { id: 12, category: 'itiraf', intensity: 2, text: 'Parasız kalsan bu masadan kimin evinde kalırdın?' },
      // İTİRAF - Seviye 3
      { id: 13, category: 'itiraf', intensity: 3, text: 'En utanç verici anın neydi? Detaylı anlat.' },
      { id: 14, category: 'itiraf', intensity: 3, text: 'Silinen mesajların geri gelse en çok utanacağın konuşma hangisi?' },
      { id: 15, category: 'itiraf', intensity: 3, text: 'Hiç kimseye söylemediğin bir fantezin var mı?' },
      { id: 16, category: 'itiraf', intensity: 3, text: 'Bu masadaki biriyle geçmişte yaşadığın ama sakladığın bir olay?' },
      
      // CESARET - Seviye 1
      { id: 20, category: 'cesaret', intensity: 1, text: 'Sağındaki kişiye samimi bir iltifat et.' },
      { id: 21, category: 'cesaret', intensity: 1, text: 'On saniye boyunca komik bir yüz ifadesi yap.' },
      { id: 22, category: 'cesaret', intensity: 1, text: 'En sevdiğin şarkının nakaratını söyle.' },
      { id: 23, category: 'cesaret', intensity: 1, text: 'Masaya en iyi taklitini göster.' },
      { id: 24, category: 'cesaret', intensity: 1, text: 'Telefonundaki son selfie\'yi herkese göster.' },
      { id: 25, category: 'cesaret', intensity: 1, text: 'Bir sonraki tura kadar sadece fısıldayarak konuş.' },
      // CESARET - Seviye 2
      { id: 26, category: 'cesaret', intensity: 2, text: 'Solundaki kişiyle on beş saniye göz teması kur.' },
      { id: 27, category: 'cesaret', intensity: 2, text: 'Son gelen mesajını yüksek sesle oku.' },
      { id: 28, category: 'cesaret', intensity: 2, text: 'Instagram\'daki son beş beğenini açıkla.' },
      { id: 29, category: 'cesaret', intensity: 2, text: 'Karşındaki kişiye dramatik bir aşk ilanı yap.' },
      { id: 30, category: 'cesaret', intensity: 2, text: 'Bir dakika boyunca herkesin her sorusuna dürüstçe cevap ver.' },
      // CESARET - Seviye 3
      { id: 31, category: 'cesaret', intensity: 3, text: 'Eski sevgiline "Seni hâlâ düşünüyorum" mesajı at.' },
      { id: 32, category: 'cesaret', intensity: 3, text: 'WhatsApp durumuna "Satılık: Hayatım" yaz, beş dakika bekle.' },
      { id: 33, category: 'cesaret', intensity: 3, text: 'Masanın seçtiği kişiyle otuz saniye sarıl.' },
      
      // OYLAMA
      { id: 40, category: 'oylama', intensity: 1, text: 'Kim en kötü yalan söyler?' },
      { id: 41, category: 'oylama', intensity: 1, text: 'Kim en romantik?' },
      { id: 42, category: 'oylama', intensity: 1, text: 'Kim en iyi sır saklar?' },
      { id: 43, category: 'oylama', intensity: 2, text: 'Kim en çok dedikodu yapar?' },
      { id: 44, category: 'oylama', intensity: 2, text: 'Kim en tehlikeli sürücü?' },
      { id: 45, category: 'oylama', intensity: 2, text: 'Kim ilk evlenecek?' },
      { id: 46, category: 'oylama', intensity: 2, text: 'Kim en iyi parti verir?' },
      { id: 47, category: 'oylama', intensity: 3, text: 'Kim en çekici?' },
      { id: 48, category: 'oylama', intensity: 3, text: 'Kimin en çok sırrı var?' },
      { id: 49, category: 'oylama', intensity: 3, text: 'Kim en çok flört eder?' },
    ];

    const avatars = ['🦊', '🦉', '🐺', '🦅', '🐆', '🦇', '🐍', '🦚', '🦢', '🐉'];
    const romanNumerals = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];
    
    const scoreRules = {
      itiraf: { complete: 5, skip: -2 },
      cesaret: { complete: 10, skip: -3 },
      oylama: { winner: 15, participant: 2 }
    };

    const categoryIcons = {
      itiraf: '🗣️',
      cesaret: '🎭',
      oylama: '🗳️'
    };

    // ==========================================
    // OYUN DURUMU
    // ==========================================
    let gameState = {
      roomCode: null,
      playerId: null,
      playerName: '',
      isHost: false,
      players: [],
      settings: {
        intensity: 2,
        categories: ['itiraf', 'cesaret', 'oylama']
      },
      currentPlayerIndex: 0,
      currentCard: null,
      usedCardIds: [],
      timer: 30,
      timerInterval: null,
      isReady: false,
      votes: {},
      voteResults: null,
      gameStarted: false,
      totalRounds: 5,
      currentRound: 0
    };

    // ==========================================
    // EKRAN YÖNETİMİ
    // ==========================================
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ==========================================
    // AYARLAR
    // ==========================================
    function selectIntensity(level) {
      gameState.settings.intensity = level;
      document.querySelectorAll('.setting-btn[data-intensity]').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.intensity) === level);
      });
    }

    function toggleCategory(cat) {
      const btn = document.querySelector(`.category-btn[data-cat="${cat}"]`);
      const index = gameState.settings.categories.indexOf(cat);
      
      if (index > -1) {
        if (gameState.settings.categories.length > 1) {
          gameState.settings.categories.splice(index, 1);
          btn.classList.remove('active');
        }
      } else {
        gameState.settings.categories.push(cat);
        btn.classList.add('active');
      }
    }

    // ==========================================
    // ODA İŞLEMLERİ
    // ==========================================
    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }

    function createRoom() {
      const name = document.getElementById('host-name').value.trim();
      if (!name) {
        alert('Lütfen adını gir');
        return;
      }

      gameState.roomCode = generateRoomCode();
      gameState.playerId = 'player_' + Date.now();
      gameState.playerName = name;
      gameState.isHost = true;
      gameState.players = [{
        id: gameState.playerId,
        name: name,
        avatar: avatars[0],
        score: 0,
        isHost: true,
        isReady: true
      }];

      saveRoomToStorage();
      showScreen('lobby-screen');
      updateLobby();
    }

    function joinRoom() {
      const codeInputs = document.querySelectorAll('.code-input');
      const code = Array.from(codeInputs).map(i => i.value).join('').toUpperCase();
      const name = document.getElementById('player-name').value.trim();

      if (code.length !== 6) {
        alert('6 haneli kodu gir');
        return;
      }
      if (!name) {
        alert('Lütfen adını gir');
        return;
      }

      const roomData = localStorage.getItem('masa_room_' + code);
      if (!roomData) {
        alert('Masa bulunamadı');
        return;
      }

      const room = JSON.parse(roomData);
      gameState.roomCode = code;
      gameState.playerId = 'player_' + Date.now();
      gameState.playerName = name;
      gameState.isHost = false;
      gameState.settings = room.settings;
      gameState.players = room.players;
      
      const avatarIndex = gameState.players.length % avatars.length;
      gameState.players.push({
        id: gameState.playerId,
        name: name,
        avatar: avatars[avatarIndex],
        score: 0,
        isHost: false,
        isReady: false
      });

      saveRoomToStorage();
      showScreen('lobby-screen');
      updateLobby();
    }

    function handleCodeInput(input, index) {
      const value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      input.value = value;
      input.classList.toggle('filled', value.length > 0);
      
      if (value && index < 5) {
        document.querySelectorAll('.code-input')[index + 1].focus();
      }
    }

    function saveRoomToStorage() {
      const data = {
        code: gameState.roomCode,
        settings: gameState.settings,
        players: gameState.players,
        currentPlayerIndex: gameState.currentPlayerIndex,
        gameStarted: gameState.gameStarted,
        usedCardIds: gameState.usedCardIds
      };
      localStorage.setItem('masa_room_' + gameState.roomCode, JSON.stringify(data));
    }

    function loadRoomFromStorage() {
      const data = localStorage.getItem('masa_room_' + gameState.roomCode);
      if (data) {
        const room = JSON.parse(data);
        gameState.players = room.players;
        gameState.currentPlayerIndex = room.currentPlayerIndex || 0;
        gameState.gameStarted = room.gameStarted || false;
        gameState.usedCardIds = room.usedCardIds || [];
      }
    }

    function updateLobby() {
      document.getElementById('display-room-code').textContent = gameState.roomCode;
      document.getElementById('player-count').textContent = gameState.players.length + ' kişi';

      const list = document.getElementById('players-list');
      list.innerHTML = gameState.players.map(p => `
        <div class="member-card ${p.isHost ? 'host' : ''}">
          <div class="member-avatar">${p.avatar}</div>
          <div class="member-info">
            <div class="member-name">${p.name}</div>
            <div class="member-status ${p.isReady ? 'ready' : ''}">
              ${p.isHost ? 'Ev sahibi' : (p.isReady ? '✓ Hazır' : 'Bekliyor')}
            </div>
          </div>
          ${p.isHost ? '<span class="host-mark">HOST</span>' : ''}
        </div>
      `).join('');

      const startBtn = document.getElementById('start-btn');
      const readyBtn = document.getElementById('ready-btn');
      
      if (gameState.isHost) {
        startBtn.style.display = 'block';
        readyBtn.style.display = 'none';
        startBtn.disabled = gameState.players.length < 1;
      } else {
        startBtn.style.display = 'none';
        readyBtn.style.display = 'block';
        readyBtn.textContent = gameState.isReady ? '✓ Hazırım' : 'Hazırım';
        readyBtn.className = gameState.isReady ? 'btn btn-primary' : 'btn btn-secondary';
      }
    }

    function toggleReady() {
      gameState.isReady = !gameState.isReady;
      const player = gameState.players.find(p => p.id === gameState.playerId);
      if (player) player.isReady = gameState.isReady;
      saveRoomToStorage();
      updateLobby();
    }

    function shareRoom() {
      const text = `MASA'ya davetlisin.\n\nKod: ${gameState.roomCode}\n\n${window.location.href}`;
      
      if (navigator.share) {
        navigator.share({ title: 'MASA Daveti', text: text });
      } else {
        navigator.clipboard.writeText(text);
        alert('Davetiye kopyalandı');
      }
    }

    function leaveRoom() {
      gameState.players = gameState.players.filter(p => p.id !== gameState.playerId);
      saveRoomToStorage();
      
      gameState = {
        ...gameState,
        roomCode: null,
        playerId: null,
        playerName: '',
        isHost: false,
        players: [],
        gameStarted: false
      };
      
      showScreen('entrance-screen');
    }

    // ==========================================
    // OYUN İŞLEMLERİ
    // ==========================================
    function startGame() {
      gameState.gameStarted = true;
      gameState.currentPlayerIndex = 0;
      gameState.currentRound = 0;
      gameState.usedCardIds = [];
      
      saveRoomToStorage();
      showScreen('game-screen');
      updateGameScreen();
    }

    function updateGameScreen() {
      // Round indicator
      const roundNum = Math.min(gameState.currentRound + 1, gameState.totalRounds);
      document.getElementById('round-indicator').textContent = 
        `${romanNumerals[roundNum - 1] || roundNum} / ${romanNumerals[gameState.totalRounds - 1]}`;

      // Scoreboard
      const scoreboard = document.getElementById('scoreboard');
      scoreboard.innerHTML = gameState.players.map((p, i) => `
        <div class="score-chip ${i === gameState.currentPlayerIndex ? 'active' : ''}">
          <span class="score-avatar">${p.avatar}</span>
          <span class="score-points">${p.score}</span>
        </div>
      `).join('');

      // Turn indicator
      const current = gameState.players[gameState.currentPlayerIndex];
      const isMyTurn = current.id === gameState.playerId;
      
      document.getElementById('turn-indicator').innerHTML = `
        <div class="turn-avatar">${current.avatar}</div>
        <div class="turn-text">${isMyTurn ? 'Senin sıran' : current.name + ' oynuyor'}</div>
      `;

      // Draw button
      const drawBtn = document.getElementById('draw-btn');
      drawBtn.style.display = gameState.currentCard ? 'none' : 'block';
      drawBtn.disabled = !isMyTurn;
      
      // Reactions
      document.getElementById('reactions-bar').style.display = gameState.currentCard ? 'flex' : 'none';
    }

    function drawCard() {
      const availableCards = cards.filter(c => 
        gameState.settings.categories.includes(c.category) &&
        c.intensity <= gameState.settings.intensity &&
        !gameState.usedCardIds.includes(c.id)
      );

      if (availableCards.length === 0) {
        endGame();
        return;
      }

      const card = availableCards[Math.floor(Math.random() * availableCards.length)];
      gameState.currentCard = card;
      gameState.usedCardIds.push(card.id);
      gameState.currentRound++;
      gameState.timer = 30;
      gameState.votes = {};
      gameState.voteResults = null;

      saveRoomToStorage();
      showCard(card);
      updateGameScreen();
    }

    function showCard(card) {
      const gameArea = document.getElementById('game-area');
      const isMyTurn = gameState.players[gameState.currentPlayerIndex].id === gameState.playerId;

      let actionsHtml = '';
      if (card.category === 'oylama') {
        actionsHtml = `
          <div class="voting-section">
            <div class="voting-title">Kime oy veriyorsun?</div>
            <div class="voting-grid">
              ${gameState.players.map(p => `
                <div class="vote-card" onclick="vote('${p.id}')">
                  <div class="vote-avatar">${p.avatar}</div>
                  <div class="vote-name">${p.name}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } else if (isMyTurn) {
        actionsHtml = `
          <div class="card-actions">
            <button class="btn btn-pass" onclick="skipCard()">Pas</button>
            <button class="btn btn-done" onclick="completeCard()">Tamamladım</button>
          </div>
        `;
      }

      gameArea.innerHTML = `
        <div class="card">
          <div class="card-category">
            <div class="card-category-icon">${categoryIcons[card.category]}</div>
            <div class="card-category-name">${card.category}</div>
          </div>
          <div class="card-divider"></div>
          <div class="card-text">${card.text}</div>
          <div class="card-timer">
            <div class="timer-bar">
              <div class="timer-fill" id="timer-fill" style="width: 100%"></div>
            </div>
            <div class="timer-text"><span id="timer-value">30</span> saniye</div>
          </div>
        </div>
        ${actionsHtml}
      `;

      document.getElementById('draw-btn').style.display = 'none';
      document.getElementById('reactions-bar').style.display = 'flex';
      
      startTimer();
    }

    function startTimer() {
      if (gameState.timerInterval) clearInterval(gameState.timerInterval);
      
      gameState.timerInterval = setInterval(() => {
        gameState.timer--;
        
        const fill = document.getElementById('timer-fill');
        const value = document.getElementById('timer-value');
        
        if (fill && value) {
          fill.style.width = (gameState.timer / 30 * 100) + '%';
          fill.classList.toggle('warning', gameState.timer <= 10);
          value.textContent = gameState.timer;
        }
        
        if (gameState.timer <= 0) {
          clearInterval(gameState.timerInterval);
          skipCard();
        }
      }, 1000);
    }

    function completeCard() {
      if (!gameState.currentCard) return;
      clearInterval(gameState.timerInterval);
      
      const player = gameState.players[gameState.currentPlayerIndex];
      const points = scoreRules[gameState.currentCard.category].complete;
      player.score += points;
      
      saveRoomToStorage();
      nextTurn();
    }

    function skipCard() {
      if (!gameState.currentCard) return;
      clearInterval(gameState.timerInterval);
      
      const player = gameState.players[gameState.currentPlayerIndex];
      const penalty = scoreRules[gameState.currentCard.category].skip;
      player.score = Math.max(0, player.score + penalty);
      
      saveRoomToStorage();
      nextTurn();
    }

    function vote(playerId) {
      gameState.votes[gameState.playerId] = playerId;
      
      document.querySelectorAll('.vote-card').forEach(card => {
        card.classList.remove('selected');
        if (card.onclick.toString().includes(playerId)) {
          card.classList.add('selected');
        }
      });

      setTimeout(() => {
        const results = {};
        gameState.players.forEach(p => {
          const randomVote = gameState.players[Math.floor(Math.random() * gameState.players.length)].id;
          results[randomVote] = (results[randomVote] || 0) + 1;
        });
        results[playerId] = (results[playerId] || 0) + 1;
        
        showVoteResults(results);
      }, 1500);
    }

    function showVoteResults(results) {
      clearInterval(gameState.timerInterval);
      
      document.querySelectorAll('.vote-card').forEach(card => {
        const pId = card.onclick.toString().match(/'([^']+)'/)[1];
        const count = results[pId] || 0;
        if (count > 0) {
          card.innerHTML += `<div class="vote-count">${count} oy</div>`;
        }
      });

      const winnerId = Object.entries(results).sort((a, b) => b[1] - a[1])[0][0];
      const winner = gameState.players.find(p => p.id === winnerId);
      if (winner) {
        winner.score += scoreRules.oylama.winner;
      }

      saveRoomToStorage();
      setTimeout(() => nextTurn(), 2500);
    }

    function nextTurn() {
      gameState.currentCard = null;
      gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;
      
      saveRoomToStorage();

      if (gameState.currentRound >= gameState.totalRounds * gameState.players.length) {
        endGame();
        return;
      }

      document.getElementById('game-area').innerHTML = `
        <button class="draw-button" id="draw-btn" onclick="drawCard()">
          <div class="draw-content">
            <span class="draw-symbol">✦</span>
            <span class="draw-text">Kart Çek</span>
          </div>
        </button>
      `;
      
      updateGameScreen();
    }

    function sendReaction(emoji) {
      const reaction = document.createElement('div');
      reaction.className = 'floating-reaction';
      reaction.textContent = emoji;
      reaction.style.left = (Math.random() * 60 + 20) + '%';
      reaction.style.bottom = '120px';
      document.body.appendChild(reaction);
      
      setTimeout(() => reaction.remove(), 2000);
    }

    // ==========================================
    // SONUÇLAR
    // ==========================================
    function endGame() {
      clearInterval(gameState.timerInterval);
      gameState.gameStarted = false;
      
      const sorted = [...gameState.players].sort((a, b) => b.score - a.score);
      
      // Confetti
      const confetti = document.getElementById('confetti');
      const confettiEmojis = ['✦', '✧', '◆', '◇', '○'];
      confetti.innerHTML = Array(12).fill(0).map((_, i) => 
        `<div class="confetti" style="left: ${i * 8 + 4}%; animation-delay: ${i * 0.2}s; color: var(--gold);">
          ${confettiEmojis[i % confettiEmojis.length]}
        </div>`
      ).join('');

      document.getElementById('winner-text').textContent = `Tebrikler, ${sorted[0].name}`;

      // Podium
      const podium = document.getElementById('podium');
      const podiumOrder = [1, 0, 2];
      const blocks = ['silver', 'gold', 'bronze'];
      
      podium.innerHTML = podiumOrder.map((rank, i) => {
        const player = sorted[rank];
        if (!player) return '';
        return `
          <div class="podium-place">
            <div class="podium-player">
              <div class="podium-avatar">${player.avatar}</div>
              <div class="podium-name">${player.name}</div>
              <div class="podium-score">${player.score} puan</div>
            </div>
            <div class="podium-block ${blocks[rank]}">${rank + 1}</div>
          </div>
        `;
      }).join('');

      showScreen('results-screen');
    }

    function shareResults() {
      const sorted = [...gameState.players].sort((a, b) => b.score - a.score);
      const text = `MASA Sonuçları\n\n🏆 ${sorted[0].name} — ${sorted[0].score} puan\n\nSıralama:\n${sorted.map((p, i) => `${i + 1}. ${p.name}: ${p.score}`).join('\n')}`;
      
      if (navigator.share) {
        navigator.share({ title: 'MASA Sonuçları', text: text });
      } else {
        navigator.clipboard.writeText(text);
        alert('Sonuçlar kopyalandı');
      }
    }

    function playAgain() {
      gameState.players.forEach(p => p.score = 0);
      gameState.currentRound = 0;
      gameState.usedCardIds = [];
      gameState.currentPlayerIndex = 0;
      
      saveRoomToStorage();
      showScreen('lobby-screen');
      updateLobby();
    }

    // ==========================================
    // BAŞLANGIÇ
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const roomCode = urlParams.get('room');
      
      if (roomCode) {
        document.querySelectorAll('.code-input').forEach((input, i) => {
          input.value = roomCode[i] || '';
          if (roomCode[i]) input.classList.add('filled');
        });
        showScreen('join-screen');
      }
    });

    setInterval(() => {
      if (gameState.roomCode && !gameState.gameStarted) {
        loadRoomFromStorage();
        updateLobby();
      }
    }, 2000);
  </script>
</body>
</html>
